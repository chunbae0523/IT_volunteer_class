<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas — 여행 루트 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;800&family=DM+Sans:wght@400;700&family=Fraunces:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-lang="ko">
    <div class="bg" aria-hidden="true">
      <div class="wave wave-a"></div>
      <div class="wave wave-b"></div>
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
    </div>

    <main class="shell">
      <header class="top">
        <nav class="nav" aria-label="페이지 이동">
          <a class="nav-link" href="../index.html" data-i18n="navHome">홈</a>
          <a class="nav-link" href="../todo/index.html" data-i18n="navTodo">일정</a>
          <a class="nav-link" href="../budget/budget.html" data-i18n="navBudget">가계부</a>
          <a class="nav-link" href="../weather/weather.html" data-i18n="navWeather">날씨</a>
          <a class="nav-link" href="../flashcard/index.html" data-i18n="navFlash">플래시</a>
          <a class="nav-link is-active" href="index.html" data-i18n="navTravel" aria-current="page">여행</a>
          <a class="nav-link" href="../about/about.html" data-i18n="navAbout">소개</a>
        </nav>
        <button type="button" class="lang-btn" id="lang-btn" aria-pressed="false">
          Tiếng Việt
        </button>
      </header>

      <section class="hero">
        <p class="eyebrow" data-i18n="eyebrow">Travel Guide</p>
        <h1 class="brand">Atlas</h1>
        <p class="tagline" data-i18n="tagline">여행지를 검색하면 하루 루트와 명소를 바로 추천해요.</p>
      </section>

      <section class="search-panel" aria-label="여행지 검색">
        <form class="search-form" id="search-form">
          <label class="sr-only" for="search-input" data-i18n="searchLabel">여행지 검색</label>
          <input
            id="search-input"
            class="search-input"
            type="search"
            autocomplete="off"
            spellcheck="false"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="예: 제주, 다낭, 도쿄…"
          />
          <button type="submit" class="search-btn" data-i18n="searchBtn">검색</button>
        </form>
        <p class="hint" data-i18n="hint">인기 여행지를 눌러도 바로 볼 수 있어요.</p>
        <div class="chips" id="chips" role="list"></div>
      </section>

      <p class="status" id="status" role="status" aria-live="polite"></p>

      <section class="result" id="result" hidden>
        <article class="dest-hero" id="dest-hero">
          <div class="dest-copy">
            <p class="dest-country" id="dest-country"></p>
            <h2 class="dest-name" id="dest-name"></h2>
            <p class="dest-blurb" id="dest-blurb"></p>
            <div class="meta" id="dest-meta"></div>
          </div>
          <div class="dest-art" id="dest-art" aria-hidden="true"></div>
        </article>

        <div class="tabs" role="tablist" aria-label="결과 보기">
          <button type="button" class="tab is-active" role="tab" aria-selected="true" data-tab="routes" data-i18n="tabRoutes">
            추천 루트
          </button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="spots" data-i18n="tabSpots">
            명소
          </button>
        </div>

        <div class="panel is-active" id="panel-routes" role="tabpanel"></div>
        <div class="panel" id="panel-spots" role="tabpanel" hidden></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
