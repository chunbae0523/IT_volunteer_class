<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Todo — 오늘의 일정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="wave"></div>
    </div>

    <main class="app">
      <header class="hero">
        <div class="top-bar">
          <nav class="nav" aria-label="페이지 이동">
            <a class="nav-link is-active" href="index.html" data-i18n="navTodo" aria-current="page">일정</a>
            <a class="nav-link" href="about.html" data-i18n="navAbout">소개</a>
          </nav>
          <button type="button" class="lang-btn" id="lang-btn" aria-pressed="false">
            Tiếng Việt
          </button>
        </div>
        <p class="eyebrow" data-i18n="eyebrow">Vacation Day</p>
        <h1 class="brand" data-i18n="brand">Day Todo</h1>
        <p class="tagline" data-i18n="tagline">오늘 하루를 가볍게, 하나씩 체크해 보세요.</p>

        <div class="gauge-wrap">
          <div class="gauge" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <svg viewBox="0 0 120 120" class="gauge-svg">
              <circle class="gauge-track" cx="60" cy="60" r="52" />
              <circle class="gauge-fill" cx="60" cy="60" r="52" />
            </svg>
            <div class="gauge-center">
              <span class="gauge-value">0%</span>
              <span class="gauge-label" data-i18n="doneLabel">완료</span>
            </div>
          </div>
          <p class="progress-caption">
            <span id="done-count">0</span> / <span id="total-count">0</span>
            <span data-i18n="doneCaption">완료</span>
          </p>
        </div>

        <div class="action-bar">
          <button type="button" class="primary-btn" id="add-btn" data-i18n="addTask">
            일정 추가
          </button>
        </div>
      </header>

      <section class="sections" id="sections" aria-label="하루 일정"></section>

      <footer class="footer">
        <button type="button" class="reset-btn" id="reset-btn" data-i18n="reset">
          모두 초기화
        </button>
      </footer>
    </main>

    <div class="modal" id="add-modal" hidden>
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title" data-i18n="modalTitle">새 일정 추가</h2>
        <form id="add-form" class="add-form">
          <label class="field">
            <span data-i18n="periodLabel">시간대</span>
            <select id="task-period" required>
              <option value="morning" data-i18n="morning">아침</option>
              <option value="lunch" data-i18n="lunch">점심</option>
              <option value="evening" data-i18n="evening">저녁</option>
            </select>
          </label>
          <label class="field">
            <span data-i18n="taskLabel">할 일</span>
            <input
              type="text"
              id="task-text"
              maxlength="80"
              required
              autocomplete="off"
              data-i18n-placeholder="taskPlaceholder"
              placeholder="예: 카페 가기"
            />
          </label>
          <div class="modal-actions">
            <button type="button" class="ghost-btn" data-close-modal data-i18n="cancel">
              취소
            </button>
            <button type="submit" class="primary-btn" data-i18n="saveTask">추가하기</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast" hidden data-i18n="toastAllDone">오늘 일정을 모두 끝냈어요!</div>

    <script src="app.js"></script>
  </body>
</html>
