<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Suite — 프로젝트 홈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;800&family=DM+Sans:wght@400;700&family=Fraunces:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body data-lang="ko">
    <div class="bg" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
    </div>

    <main class="shell">
      <header class="hero">
        <div class="hero-top">
          <p class="eyebrow" data-i18n="eyebrow">Project Hub</p>
          <button type="button" class="lang-btn" id="lang-btn" aria-pressed="false">
            Tiếng Việt
          </button>
        </div>
        <h1 class="brand" data-i18n="brand">Day Suite</h1>
        <p class="tagline" data-i18n="tagline">지금까지 만든 앱을 한곳에서 열어보세요.</p>
      </header>

      <section class="grid" aria-label="프로젝트 목록">
        <a class="card card-todo" href="todo/index.html" style="--i: 0">
          <span class="card-label" data-i18n="todoLabel">일정</span>
          <strong class="card-title" data-i18n="todoTitle">Day Todo</strong>
          <p class="card-desc" data-i18n="todoDesc">하루 일정을 추가하고 완료율을 확인해요.</p>
        </a>

        <a class="card card-budget" href="budget/budget.html" style="--i: 1">
          <span class="card-label" data-i18n="budgetLabel">가계부</span>
          <strong class="card-title" data-i18n="budgetTitle">Ledger</strong>
          <p class="card-desc" data-i18n="budgetDesc">수입·지출을 기록하고 하루 소득을 봐요.</p>
        </a>

        <a class="card card-weather" href="weather/weather.html" style="--i: 2">
          <span class="card-label" data-i18n="weatherLabel">날씨</span>
          <strong class="card-title" data-i18n="weatherTitle">Skyline</strong>
          <p class="card-desc" data-i18n="weatherDesc">도시 날씨와 기온, 습도를 확인해요.</p>
        </a>

        <a class="card card-flash" href="flashcard/index.html" style="--i: 3">
          <span class="card-label" data-i18n="flashLabel">게임</span>
          <strong class="card-title" data-i18n="flashTitle">Flash Match</strong>
          <p class="card-desc" data-i18n="flashDesc">보이는 카드에서 베트남어·한국어 짝을 맞춰 보세요.</p>
        </a>

        <a class="card card-travel" href="travel/index.html" style="--i: 4">
          <span class="card-label" data-i18n="travelLabel">여행</span>
          <strong class="card-title" data-i18n="travelTitle">Atlas</strong>
          <p class="card-desc" data-i18n="travelDesc">여행지를 검색하고 하루 루트·명소를 추천받아요.</p>
        </a>

        <a class="card card-about" href="about/about.html" style="--i: 5">
          <span class="card-label" data-i18n="aboutLabel">소개</span>
          <strong class="card-title" data-i18n="aboutTitle">About</strong>
          <p class="card-desc" data-i18n="aboutDesc">자기소개와 취향을 담은 프로필 페이지.</p>
        </a>
      </section>
    </main>

    <script src="home.js"></script>
  </body>
</html>
